name: Deploy Catalog Site

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.1.0
        with:
          go-version: "1.25"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: Build CLaaT
        working-directory: claat
        run: |
          go build -o ../claat-bin ./main.go
          chmod +x ../claat-bin

      - name: Export codelabs
        run: |
          mkdir -p temp

          # Export all markdown files
          for file in sample-codelabs/*.md; do
            if [ -f "$file" ]; then
              echo "Exporting $file..."
              ./claat-bin export -o temp "$file"
            fi
          done

      - name: Build catalog site
        run: |
          echo "Generating catalog site..."
          ./claat-bin catalog -o temp -title "Codelab Tools" -description "Interactive codelabs and tutorials"
          
          echo "Catalog contents:"
          ls -la temp

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./temp
          publish_branch: gh-pages
